import lit.formats
import os

# Lit suite for the `extras/` showcase libraries. Mirrors tests/lit.cfg's substitutions so the same
# %arche / %analyzer / %t work here. The PORTABLE extras (the `platform` device + its demo) are CI-
# gated like any other test; the gfx device and its demo are EXCLUDED — they need a real display and
# system libraries (libX11 / libwayland) that the CI runner doesn't have, so they stay manual-verify.
config.name = "Arche-extras"
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = ['.arche']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = os.path.join(config.test_source_root, '..', 'build', 'test-results-extras')

# Display/system-lib dependent — not runnable on a headless CI runner.
config.excludes = ['gfx', 'gfx_demo.arche', 'build']

os.makedirs(config.test_exec_root, exist_ok=True)

for _v in ('ARCHE_LOWER_CST', 'ARCHE_LOWER_PROGRAM', 'ARCHE_SEM_CST', 'ARCHE_PER_UNIT'):
    if _v in os.environ:
        config.environment[_v] = os.environ[_v]

repo_root = os.path.join(config.test_source_root, '..')
build_dir = os.path.join(repo_root, 'build')
config.substitutions = [
    ('%arche', os.path.join(build_dir, 'arche')),
    ('%analyzer', os.path.join(build_dir, 'arche-analyzer')),
    ('%build', build_dir),
    ('%repo', repo_root),
]
