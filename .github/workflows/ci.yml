name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  format-and-test:
    runs-on: ubuntu-latest
    name: Format & Test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format build-essential llvm

      - name: Build project
        run: make clean && make

      - name: Check C code formatting
        run: |
          echo "Checking C code formatting..."
          UNFORMATTED=$(find . -name "*.c" -o -name "*.h" | grep -v '.git' | while read file; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "$file"
            fi
          done)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted correctly:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "✓ All C files properly formatted"

      - name: Run all tests
        run: make test

      - name: Check test results
        if: success()
        run: echo "✓ All tests passed"

  # Require status checks for PR merges
  status-check:
    needs: format-and-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job status
        run: |
          if [ "${{ needs.format-and-test.result }}" != "success" ]; then
            echo "Format and test job failed"
            exit 1
          fi
        shell: bash
