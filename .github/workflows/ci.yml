name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  format-and-test:
    runs-on: ubuntu-latest
    name: Format & Test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          # Single source of truth for clang-format version: .clang-format-version
          # in the repo. Bump it there → CI + local both follow on the next run.
          CLANG_FORMAT_VERSION=$(cat .clang-format-version)
          sudo apt-get update
          sudo apt-get install -y build-essential llvm python3-pip wget lsb-release software-properties-common gnupg
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- "$CLANG_FORMAT_VERSION"
          sudo apt-get install -y "clang-format-$CLANG_FORMAT_VERSION"
          pip3 install --break-system-packages --upgrade lit

      - name: Generate test data
        run: python3 design_analysis/benchmarks/etl/data/generate_data.py 1000 design_analysis/benchmarks/etl/data/data.csv

      - name: Build project
        run: make clean && make

      - name: Check C code formatting
        run: |
          # Read the pinned version (same file the Makefile reads) so the binary
          # invoked here matches the developer's local `make format`.
          CLANG_FORMAT="clang-format-$(cat .clang-format-version)"
          echo "Checking C code formatting with $($CLANG_FORMAT --version)..."
          # Skip wayland-scanner-GENERATED protocol code (`*-protocol.c` / `*-client-protocol.h`):
          # it is machine-emitted, not hand-written, so it isn't held to the clang-format style.
          UNFORMATTED=$(find . -name "*.c" -o -name "*.h" | grep -vE '\.git|-protocol\.(c|h)$' | while read file; do
            if ! $CLANG_FORMAT --dry-run --Werror "$file" 2>/dev/null; then
              echo "$file"
            fi
          done)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not formatted correctly:"
            echo "$UNFORMATTED"
            exit 1
          fi
          echo "✓ All C files properly formatted"

      - name: Run all tests
        run: make test
        env:
          ARCHE_CORE_DIR: ${{ github.workspace }}/core

      - name: Memory-safety gate (ASan/UBSan)
        run: make test-asan
        env:
          ARCHE_CORE_DIR: ${{ github.workspace }}/core

      # NB: two codegen checks are intentionally NOT gated here, both manual-only (`make test-per-unit`,
      # `make verify-codegen`):
      #  - per-unit codegen is DORMANT (default-off, no current consumer); the always-on ODR verifier
      #    catches divergence whenever it IS run.
      #  - verify-codegen diffs RAW (pre-opt) IR against goldens — machine-independent (so it CAN'T be
      #    post-opt: optimized IR is LLVM-version-dependent and would flake on the runner) but it churns
      #    on cosmetic codegen changes. Behavioral tests + ASan are the correctness gates here; run
      #    verify-codegen by hand to review a change's IR impact or chase a suspected silent regression.

      - name: Check test results
        if: success()
        run: echo "✓ All tests passed"

  # Require every PR to bump VERSION: the build bakes it in (-DARCHE_VERSION) and `arche version`
  # reports it, so master must never carry a stale or duplicate version. We fail (rather than
  # auto-bump) so the bump stays in the PR diff and the author chooses patch/minor/major — no
  # bot commits, no push-back token, no CI loops.
  version-check:
    runs-on: ubuntu-latest
    name: Version bump
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Require VERSION to increase
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.base_ref }}"
          git fetch --depth=1 origin "$base"
          head_v=$(cat VERSION 2>/dev/null || echo 0.0.0)
          base_v=$(git show "origin/$base:VERSION" 2>/dev/null || echo 0.0.0)
          # Compare the X.Y.Z core, ignoring any -prerelease / +build suffix.
          core() { echo "$1" | sed -E 's/[-+].*$//'; }
          hv=$(core "$head_v"); bv=$(core "$base_v")
          echo "base VERSION=$base_v (core $bv) -> head VERSION=$head_v (core $hv)"
          if [ "$hv" = "$bv" ]; then
            echo "::error file=VERSION::VERSION must be bumped: still $base_v. Edit the VERSION file (patch/minor/major)."
            exit 1
          fi
          greatest=$(printf '%s\n%s\n' "$bv" "$hv" | sort -V | tail -1)
          if [ "$greatest" != "$hv" ]; then
            echo "::error file=VERSION::VERSION went backwards: head $head_v < base $base_v."
            exit 1
          fi
          echo "✓ VERSION increased ($base_v -> $head_v)"

  # Require status checks for PR merges
  status-check:
    needs: [format-and-test, version-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job status
        run: |
          # Treat success AND skipped as OK (version-check is skipped on direct pushes to master);
          # only an actual failure blocks the merge.
          if [ "${{ needs.format-and-test.result }}" = "failure" ]; then
            echo "Format and test job failed"
            exit 1
          fi
          if [ "${{ needs.version-check.result }}" = "failure" ]; then
            echo "Version bump check failed"
            exit 1
          fi
        shell: bash
