import lit.formats
import os

config.name = "Arche"
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = ['.arche', '.py']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = os.path.join(config.test_source_root, '..', 'build', 'test-results')

# Exclude archive. (The `known_failures` mechanism is retired — those tests were audited and either
# fixed-and-relocated into the live suite or deleted; no such directory exists.)
config.excludes = ['archive', 'e2e_hot_reload']  # e2e_hot_reload runs off-gate via `make test-e2e`

# Create test result directory
os.makedirs(config.test_exec_root, exist_ok=True)

# Forward the front-end migration toggles into the test environment (lit otherwise
# scrubs them), so `ARCHE_LOWER_CST=1 lit` / `ARCHE_SEM_CST=1 lit` / `ARCHE_LOWER_PROGRAM=1
# lit` / `ARCHE_PER_UNIT=1 lit` actually exercise the selected paths in the compiler.
for _v in ('ARCHE_LOWER_CST', 'ARCHE_LOWER_PROGRAM', 'ARCHE_SEM_CST', 'ARCHE_PER_UNIT'):
    if _v in os.environ:
        config.environment[_v] = os.environ[_v]

# Arche compiler path
arche_bin = os.path.join(config.test_source_root, '..', 'build', 'arche')
build_dir = os.path.join(config.test_source_root, '..', 'build')

repo_root = os.path.join(config.test_source_root, '..')
config.substitutions = [
    ('%arche', arche_bin),
    # The standalone analyzer (LSP back-end), so tests can assert the editor and the compiler
    # AGREE — e.g. that a target-variant-specific error is reported by both, never just one.
    ('%analyzer', os.path.join(build_dir, 'arche-analyzer')),
    ('%build', build_dir),
    ('%repo', repo_root),
    # %t is auto-generated unique per test by LIT
]
