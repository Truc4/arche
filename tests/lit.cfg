import lit.formats
import os

config.name = "Arche"
config.test_format = lit.formats.ShTest(execute_external=True)
config.suffixes = ['.arche', '.py']
config.test_source_root = os.path.dirname(__file__)
config.test_exec_root = os.path.join(config.test_source_root, '..', 'build', 'test-results')

# Exclude archive and known failures
config.excludes = ['archive', 'known_failures']

# Create test result directory
os.makedirs(config.test_exec_root, exist_ok=True)

# Forward the CST-lowering toggle into the test environment (lit otherwise scrubs
# it), so `ARCHE_LOWER_CST=1 lit` actually exercises the CST-driven lowerer.
if 'ARCHE_LOWER_CST' in os.environ:
    config.environment['ARCHE_LOWER_CST'] = os.environ['ARCHE_LOWER_CST']

# Arche compiler path
arche_bin = os.path.join(config.test_source_root, '..', 'build', 'arche')
build_dir = os.path.join(config.test_source_root, '..', 'build')

repo_root = os.path.join(config.test_source_root, '..')
config.substitutions = [
    ('%arche', arche_bin),
    ('%build', build_dir),
    ('%repo', repo_root),
    # %t is auto-generated unique per test by LIT
]
